<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WISP Control - Gestión de Internet</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            Users, Wifi, DollarSign, Calendar, Plus, Search, 
            CheckCircle, AlertCircle, XCircle, Trash2, Edit2, 
            X, Cloud, Phone
        } = lucideReact;

        function App() {
            const [clients, setClients] = useState(() => {
                const saved = localStorage.getItem('wisp_data_v1');
                return saved ? JSON.parse(saved) : [];
            });

            const [searchTerm, setSearchTerm] = useState('');
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [filterStatus, setFilterStatus] = useState('todos');
            
            const [formData, setFormData] = useState({
                name: '', phone: '', ip: '', plan: '', price: '', dueDate: '', status: 'aldia'
            });

            useEffect(() => {
                localStorage.setItem('wisp_data_v1', JSON.stringify(clients));
            }, [clients]);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (editingId) {
                    setClients(clients.map(c => c.id === editingId ? { ...formData, id: editingId } : c));
                } else {
                    setClients([{ ...formData, id: Date.now() }, ...clients]);
                }
                closeForm();
            };

            const deleteClient = (id) => {
                if (confirm('¿Estás seguro de eliminar este registro?')) {
                    setClients(clients.filter(c => c.id !== id));
                }
            };

            const editClient = (client) => {
                setFormData(client);
                setEditingId(client.id);
                setIsFormOpen(true);
            };

            const closeForm = () => {
                setIsFormOpen(false);
                setEditingId(null);
                setFormData({ name: '', phone: '', ip: '', plan: '', price: '', dueDate: '', status: 'aldia' });
            };

            const filteredClients = useMemo(() => {
                return clients.filter(client => {
                    const nameMatch = client.name ? client.name.toLowerCase().includes(searchTerm.toLowerCase()) : false;
                    const ipMatch = client.ip ? client.ip.includes(searchTerm) : false;
                    const matchesSearch = nameMatch || ipMatch;
                    const matchesFilter = filterStatus === 'todos' || client.status === filterStatus;
                    return matchesSearch && matchesFilter;
                });
            }, [clients, searchTerm, filterStatus]);

            const stats = useMemo(() => {
                return {
                    total: clients.length,
                    pendientes: clients.filter(c => c.status === 'pendiente').length
                };
            }, [clients]);

            return (
                <div className="min-h-screen flex flex-col max-w-md mx-auto bg-slate-50 shadow-2xl relative">
                    <header className="bg-indigo-600 text-white p-6 rounded-b-[2rem] shadow-lg sticky top-0 z-20">
                        <div className="flex justify-between items-center mb-4">
                            <div>
                                <h1 className="text-2xl font-bold tracking-tight flex items-center">
                                    <Wifi className="mr-2 h-6 w-6 text-indigo-200" />
                                    WISP Control
                                </h1>
                            </div>
                            <div className="bg-indigo-500/40 p-2 rounded-full">
                                <Cloud className="h-5 w-5 text-indigo-100" />
                            </div>
                        </div>
                        <div className="grid grid-cols-2 gap-3 mt-2">
                            <div className="bg-white/10 backdrop-blur-md p-3 rounded-2xl border border-white/10">
                                <span className="text-[10px] uppercase font-bold text-indigo-200 block mb-1">Clientes</span>
                                <div className="text-xl font-bold">{stats.total}</div>
                            </div>
                            <div className="bg-white/10 backdrop-blur-md p-3 rounded-2xl border border-white/10 text-orange-200">
                                <span className="text-[10px] uppercase font-bold text-indigo-200 block mb-1">Pendientes</span>
                                <div className="text-xl font-bold">{stats.pendientes}</div>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 px-4 py-6 space-y-6 overflow-y-auto pb-32">
                        <div className="space-y-3">
                            <div className="relative">
                                <Search className="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-400" />
                                <input 
                                    type="text" 
                                    placeholder="Buscar por nombre o IP..." 
                                    className="w-full bg-white border-none rounded-2xl py-4 pl-12 pr-4 shadow-sm outline-none text-slate-700"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                            <div className="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                                {['todos', 'aldia', 'pendiente', 'cortado'].map((status) => (
                                    <button 
                                        key={status}
                                        onClick={() => setFilterStatus(status)}
                                        className={`px-4 py-2 rounded-full text-xs font-semibold whitespace-nowrap transition-all ${
                                            filterStatus === status 
                                            ? 'bg-indigo-600 text-white shadow-md' 
                                            : 'bg-white text-slate-500 border border-slate-100'
                                        }`}
                                    >
                                        {status === 'todos' ? 'Todos' : status === 'aldia' ? 'Al día' : status === 'pendiente' ? 'Pendientes' : 'Cortados'}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="space-y-4">
                            {filteredClients.map(client => (
                                <div key={client.id} className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 relative overflow-hidden group">
                                    <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${
                                        client.status === 'aldia' ? 'bg-emerald-500' : 
                                        client.status === 'pendiente' ? 'bg-amber-500' : 'bg-rose-500'
                                    }`}></div>
                                    <div className="flex justify-between items-start mb-4">
                                        <div>
                                            <h3 className="font-bold text-slate-800 text-lg leading-tight">{client.name}</h3>
                                            <div className="flex items-center text-slate-400 text-xs mt-1">
                                                <Phone className="h-3 w-3 mr-1" />
                                                {client.phone}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2 mb-4">
                                        <div className="bg-slate-50 rounded-2xl p-3 border border-slate-100">
                                            <div className="text-[10px] text-slate-400 font-bold uppercase mb-1 text-center">IP Antena</div>
                                            <div className="text-slate-700 font-mono font-medium text-sm text-center">{client.ip}</div>
                                        </div>
                                        <div className="bg-slate-50 rounded-2xl p-3 border border-slate-100">
                                            <div className="text-[10px] text-slate-400 font-bold uppercase mb-1 text-center">Fecha Corte</div>
                                            <div className="text-slate-700 font-medium text-sm text-center">{client.dueDate}</div>
                                        </div>
                                    </div>
                                    <div className="flex justify-between items-center pt-3 border-t border-slate-50">
                                        <div className="flex items-center text-indigo-600 font-bold">
                                            <DollarSign className="h-4 w-4 mr-0.5" />
                                            {Number(client.price).toLocaleString()}
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => editClient(client)} className="p-2.5 bg-slate-100 text-slate-600 rounded-xl">
                                                <Edit2 className="h-4 w-4" />
                                            </button>
                                            <button onClick={() => deleteClient(client.id)} className="p-2.5 bg-slate-100 text-rose-400 rounded-xl">
                                                <Trash2 className="h-4 w-4" />
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    <div className="fixed bottom-8 left-1/2 -translate-x-1/2 flex justify-center w-full max-w-md px-6 z-30">
                        <button 
                            onClick={() => setIsFormOpen(true)}
                            className="bg-indigo-600 text-white w-full py-4 rounded-2xl shadow-xl shadow-indigo-200 font-bold text-lg flex items-center justify-center active:scale-95 transition-transform"
                        >
                            <Plus className="mr-2 h-6 w-6" /> Nuevo Cliente
                        </button>
                    </div>

                    {isFormOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center">
                            <div className="bg-white w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 shadow-2xl max-h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-black text-slate-800">{editingId ? 'Editar Cliente' : 'Nuevo Cliente'}</h2>
                                    <button onClick={closeForm} className="bg-slate-100 p-2 rounded-full text-slate-400">
                                        <X className="h-6 w-6" />
                                    </button>
                                </div>
                                <form onSubmit={handleSubmit} className="space-y-5">
                                    <input required name="name" value={formData.name} onChange={handleInputChange} placeholder="Nombre del cliente" type="text" className="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 outline-none focus:border-indigo-500 transition-all text-slate-700" />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input required name="phone" value={formData.phone} onChange={handleInputChange} placeholder="Teléfono" type="tel" className="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 outline-none focus:border-indigo-500 transition-all text-slate-700" />
                                        <input required name="ip" placeholder="IP Antena" value={formData.ip} onChange={handleInputChange} type="text" className="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 outline-none focus:border-indigo-500 transition-all text-slate-700" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input required name="plan" placeholder="Plan (10Mb)" value={formData.plan} onChange={handleInputChange} type="text" className="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 outline-none focus:border-indigo-500 transition-all text-slate-700" />
                                        <input required name="price" value={formData.price} onChange={handleInputChange} placeholder="Mensualidad" type="number" className="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 outline-none focus:border-indigo-500 transition-all text-slate-700" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input required name="dueDate" value={formData.dueDate} onChange={handleInputChange} type="date" className="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 outline-none focus:border-indigo-500 transition-all text-slate-700" />
                                        <select name="status" value={formData.status} onChange={handleInputChange} className="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 outline-none focus:border-indigo-500 transition-all text-slate-700">
                                            <option value="aldia">✅ Al día</option>
                                            <option value="pendiente">⏳ Pendiente</option>
                                            <option value="cortado">❌ Cortado</option>
                                        </select>
                                    </div>
                                    <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-xl hover:bg-indigo-700 mt-6">
                                        {editingId ? 'Guardar Cambios' : 'Registrar Cliente'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                    <div className="safe-area-bottom h-20"></div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
