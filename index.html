<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>WISP Control Cloud</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; }
            .print-area { 
                position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
                background: white; z-index: 9999; padding: 20px;
                display: flex; flex-direction: column;
            }
            .print-shadow-none { box-shadow: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ---------------------------------------------------------
        // 1. CONFIGURACIÓN DE FIREBASE
        // ---------------------------------------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyCNkQiElGE7ud9EIht4Li8pg6DBSRuorW8",
            authDomain: "wisp-la-dorada.firebaseapp.com",
            projectId: "wisp-la-dorada",
            storageBucket: "wisp-la-dorada.firebasestorage.app",
            messagingSenderId: "191768568916",
            appId: "1:191768568916:web:2a538b5ac3bdc36a8df9c1"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        // ---------------------------------------------------------

        const { useState, useEffect, useMemo } = React;

        function App() {
            const [clients, setClients] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [filterStatus, setFilterStatus] = useState('todos');
            
            const [receiptClient, setReceiptClient] = useState(null);
            const [historyClient, setHistoryClient] = useState(null);
            
            const [formData, setFormData] = useState({
                name: '', phone: '', ip: '', plan: '', price: '', dueDate: '', status: 'aldia', history: []
            });

            // OBTENER DATOS Y EJECUTAR MOTOR AUTOMÁTICO DE FECHAS
            useEffect(() => {
                const unsubscribe = db.collection("clientes").onSnapshot((querySnapshot) => {
                    const clientsData = [];
                    const updatesToFirebase = []; 

                    const today = new Date();
                    const yyyy = today.getFullYear();
                    const mm = String(today.getMonth() + 1).padStart(2, '0');
                    const dd = String(today.getDate()).padStart(2, '0');
                    const todayString = `${yyyy}-${mm}-${dd}`;

                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        let currentStatus = data.status;

                        // Si está al día, pero la fecha de corte es hoy o ya pasó, pasa a pendiente
                        if (currentStatus === 'aldia' && data.dueDate && data.dueDate <= todayString) {
                            currentStatus = 'pendiente';
                            updatesToFirebase.push({ id: doc.id, newStatus: currentStatus });
                        }

                        clientsData.push({ id: doc.id, ...data, status: currentStatus, history: data.history || [] });
                    });

                    setClients(clientsData.sort((a, b) => b.createdAt - a.createdAt));
                    setLoading(false);

                    updatesToFirebase.forEach(update => {
                        db.collection("clientes").doc(update.id).update({ status: update.newStatus })
                          .catch(err => console.error("Error auto-actualizando: ", err));
                    });

                }, (error) => {
                    console.error("Error Firebase: ", error);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, []);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                try {
                    if (editingId) {
                        await db.collection("clientes").doc(editingId).update(formData);
                    } else {
                        await db.collection("clientes").add({
                            ...formData,
                            history: [],
                            createdAt: Date.now()
                        });
                    }
                    closeForm();
                } catch (error) {
                    console.error("Error guardando documento: ", error);
                    alert("Error al guardar el cliente.");
                }
            };

            // RENOVAR MES Y REGISTRAR EN HISTORIAL
            const handleRenew = async (client) => {
                const confirmMsg = `¿Registrar pago de $${Number(client.price).toLocaleString('es-CO')} y renovar 1 mes de servicio a ${client.name}?`;
                if (window.confirm(confirmMsg)) {
                    try {
                        const [y, m, d] = client.dueDate.split('-');
                        const nextMonth = new Date(y, parseInt(m), d); 
                        const newY = nextMonth.getFullYear();
                        const newM = String(nextMonth.getMonth() + 1).padStart(2, '0');
                        const newD = String(nextMonth.getDate()).padStart(2, '0');
                        const newDueDate = `${newY}-${newM}-${newD}`;

                        const historyEntry = {
                            date: new Date().toLocaleDateString('es-CO'),
                            amount: client.price,
                            periodCovered: client.dueDate 
                        };

                        const updatedHistory = [...(client.history || []), historyEntry];

                        await db.collection("clientes").doc(client.id).update({
                            dueDate: newDueDate,
                            status: 'aldia',
                            history: updatedHistory
                        });

                    } catch (error) {
                        console.error("Error al renovar: ", error);
                        alert("Hubo un error al registrar el pago.");
                    }
                }
            };

            // ENVIAR NOTIFICACIÓN POR WHATSAPP
            const handleWhatsApp = (client) => {
                // Limpiar el número de teléfono (quitar espacios o guiones)
                let phone = client.phone.replace(/\D/g, '');
                
                // Si el número tiene 10 dígitos y empieza por 3 (típico en Colombia), le agregamos el +57
                if (phone.length === 10 && phone.startsWith('3')) {
                    phone = '57' + phone;
                }

                // Generar el mensaje de cobro
                const message = `Hola ${client.name}, te recordamos que tu mes de servicio de internet se encuentra pendiente de pago desde el ${client.dueDate}. El saldo a cancelar es de $${Number(client.price).toLocaleString('es-CO')}. Por favor realiza el pago para evitar la suspensión del servicio. ¡Gracias!`;
                
                // Crear el enlace y abrir WhatsApp
                const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
                window.open(url, '_blank');
            };

            const deleteClient = async (id) => {
                if (window.confirm('¿Eliminar este registro en la nube de forma permanente?')) {
                    await db.collection("clientes").doc(id).delete();
                }
            };

            const editClient = (client) => {
                setFormData(client);
                setEditingId(client.id);
                setIsFormOpen(true);
            };

            const closeForm = () => {
                setIsFormOpen(false);
                setEditingId(null);
                setFormData({ name: '', phone: '', ip: '', plan: '', price: '', dueDate: '', status: 'aldia', history: [] });
            };

            const handlePrint = () => window.print();

            const filteredClients = useMemo(() => {
                return clients.filter(client => {
                    const nameMatch = client.name ? client.name.toLowerCase().includes(searchTerm.toLowerCase()) : false;
                    const ipMatch = client.ip ? client.ip.includes(searchTerm) : false;
                    const matchesSearch = nameMatch || ipMatch;
                    const matchesFilter = filterStatus === 'todos' || client.status === filterStatus;
                    return matchesSearch && matchesFilter;
                });
            }, [clients, searchTerm, filterStatus]);

            const stats = useMemo(() => {
                return {
                    total: clients.length,
                    pendientes: clients.filter(c => c.status === 'pendiente' || c.status === 'cortado').length
                };
            }, [clients]);

            const todayDate = new Date().toLocaleDateString('es-CO');

            if (loading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 text-indigo-600">
                        <i className="fa-solid fa-circle-notch fa-spin text-4xl mb-4"></i>
                        <p className="font-bold animate-pulse">Conectando a la nube...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col max-w-md mx-auto bg-slate-50 shadow-2xl relative">
                    <header className="no-print bg-indigo-600 text-white p-6 rounded-b-[2rem] shadow-lg sticky top-0 z-20">
                        <div className="flex justify-between items-center mb-4">
                            <div>
                                <h1 className="text-2xl font-bold tracking-tight flex items-center">
                                    <i className="fa-solid fa-wifi mr-3 text-indigo-200"></i>
                                    WISP Control
                                </h1>
                            </div>
                            <div className="bg-indigo-500/40 w-10 h-10 flex items-center justify-center rounded-full relative">
                                <i className="fa-solid fa-cloud text-indigo-100"></i>
                                <span className="absolute -top-1 -right-1 w-3 h-3 bg-emerald-400 rounded-full border-2 border-indigo-600"></span>
                            </div>
                        </div>
                        <div className="grid grid-cols-2 gap-3 mt-2">
                            <div className="bg-white/10 backdrop-blur-md p-3 rounded-2xl border border-white/10">
                                <span className="text-[10px] uppercase font-bold text-indigo-200 block mb-1">Clientes</span>
                                <div className="text-xl font-bold">{stats.total}</div>
                            </div>
                            <div className="bg-white/10 backdrop-blur-md p-3 rounded-2xl border border-white/10 text-orange-200">
                                <span className="text-[10px] uppercase font-bold text-indigo-200 block mb-1">Por Cobrar</span>
                                <div className="text-xl font-bold">{stats.pendientes}</div>
                            </div>
                        </div>
                    </header>

                    <main className="no-print flex-1 px-4 py-6 space-y-6 overflow-y-auto pb-32">
                        <div className="space-y-3">
                            <div className="relative">
                                <i className="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                <input 
                                    type="text" 
                                    placeholder="Buscar por nombre o IP..." 
                                    className="w-full bg-white border-none rounded-2xl py-4 pl-12 pr-4 shadow-sm outline-none text-slate-700"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                            <div className="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                                {['todos', 'aldia', 'pendiente', 'cortado'].map((status) => (
                                    <button 
                                        key={status}
                                        onClick={() => setFilterStatus(status)}
                                        className={`px-4 py-2 rounded-full text-xs font-semibold whitespace-nowrap transition-all ${
                                            filterStatus === status 
                                            ? 'bg-indigo-600 text-white shadow-md' 
                                            : 'bg-white text-slate-500 border border-slate-100'
                                        }`}
                                    >
                                        {status === 'todos' ? 'Todos' : status === 'aldia' ? 'Al día' : status === 'pendiente' ? 'Pendientes' : 'Cortados'}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="space-y-4">
                            {filteredClients.length === 0 && (
                                <div className="text-center py-10 text-slate-400">
                                    <i className="fa-solid fa-cloud text-4xl mb-3 opacity-50"></i>
                                    <p>Base de datos lista.</p>
                                </div>
                            )}
                            
                            {filteredClients.map(client => (
                                <div key={client.id} className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 relative overflow-hidden group">
                                    <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${
                                        client.status === 'aldia' ? 'bg-emerald-500' : 
                                        client.status === 'pendiente' ? 'bg-amber-500' : 'bg-rose-500'
                                    }`}></div>
                                    <div className="flex justify-between items-start mb-4">
                                        <div>
                                            <h3 className="font-bold text-slate-800 text-lg leading-tight">{client.name}</h3>
                                            <div className="flex items-center text-slate-400 text-xs mt-1">
                                                <i className="fa-solid fa-phone mr-1.5 text-[10px]"></i>
                                                {client.phone}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2 mb-4">
                                        <div className="bg-slate-50 rounded-2xl p-3 border border-slate-100">
                                            <div className="text-[10px] text-slate-400 font-bold uppercase mb-1 text-center">IP Antena</div>
                                            <div className="text-slate-700 font-mono font-medium text-sm text-center">{client.ip}</div>
                                        </div>
                                        <div className="bg-slate-50 rounded-2xl p-3 border border-slate-100">
                                            <div className="text-[10px
