<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>WISP Control Cloud</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px) scale(0.95); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
        .animate-fade-in { animation: fadeIn 0.15s ease-out forwards; transform-origin: bottom right; }

        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; }
            .print-area { 
                position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
                background: white; z-index: 9999; padding: 20px;
                display: flex; flex-direction: column;
            }
            .print-shadow-none { box-shadow: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ---------------------------------------------------------
        // 1. CONFIGURACIÓN DE FIREBASE
        // ---------------------------------------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyCNkQiElGE7ud9EIht4Li8pg6DBSRuorW8",
            authDomain: "wisp-la-dorada.firebaseapp.com",
            projectId: "wisp-la-dorada",
            storageBucket: "wisp-la-dorada.firebasestorage.app",
            messagingSenderId: "191768568916",
            appId: "1:191768568916:web:2a538b5ac3bdc36a8df9c1"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        // ---------------------------------------------------------

        const { useState, useEffect, useMemo } = React;

        function App() {
            const [clients, setClients] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [filterStatus, setFilterStatus] = useState('todos');
            
            const [receiptClient, setReceiptClient] = useState(null);
            const [historyClient, setHistoryClient] = useState(null);
            const [openMenuId, setOpenMenuId] = useState(null);
            
            // NUEVO: Agregamos "zona" al estado inicial del formulario
            const [formData, setFormData] = useState({
                name: '', zona: '', phone: '', ip: '', plan: '', price: '', dueDate: '', status: 'aldia', history: []
            });

            useEffect(() => {
                const unsubscribe = db.collection("clientes").onSnapshot((querySnapshot) => {
                    const clientsData = [];
                    const updatesToFirebase = []; 

                    const today = new Date();
                    const yyyy = today.getFullYear();
                    const mm = String(today.getMonth() + 1).padStart(2, '0');
                    const dd = String(today.getDate()).padStart(2, '0');
                    const todayString = `${yyyy}-${mm}-${dd}`;

                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        let currentStatus = data.status || 'aldia';

                        if (currentStatus === 'aldia' && data.dueDate && data.dueDate <= todayString) {
                            currentStatus = 'pendiente';
                            updatesToFirebase.push({ id: doc.id, newStatus: currentStatus });
                        }

                        clientsData.push({ 
                            id: doc.id, 
                            ...data, 
                            status: currentStatus, 
                            history: data.history || [] 
                        });
                    });

                    setClients(clientsData.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)));
                    setLoading(false);

                    updatesToFirebase.forEach(update => {
                        db.collection("clientes").doc(update.id).update({ status: update.newStatus })
                          .catch(err => console.error("Error auto-actualizando: ", err));
                    });

                }, (error) => {
                    console.error("Error Firebase: ", error);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, []);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                // Limpiar espacios en blanco al inicio/final de la zona para evitar duplicados accidentales
                const finalData = { ...formData, zona: formData.zona.trim() };

                try {
                    if (editingId) {
                        await db.collection("clientes").doc(editingId).update(finalData);
                    } else {
                        await db.collection("clientes").add({
                            ...finalData,
                            history: [],
                            createdAt: Date.now()
                        });
                    }
                    closeForm();
                } catch (error) {
                    console.error("Error guardando documento: ", error);
                    alert("Error al guardar el cliente.");
                }
            };

            const handleRenew = async (client) => {
                if (!client.dueDate) {
                    return alert("El cliente no tiene una fecha de corte registrada para renovar.");
                }

                const priceToPay = client.price ? Number(client.price) : 0;
                const confirmMsg = `¿Registrar pago de $${priceToPay.toLocaleString('es-CO')} y renovar 1 mes de servicio a ${client.name || 'este cliente'}?`;
                
                if (window.confirm(confirmMsg)) {
                    try {
                        const [y, m, d] = client.dueDate.split('-');
                        const nextMonth = new Date(y, parseInt(m), d); 
                        const newY = nextMonth.getFullYear();
                        const newM = String(nextMonth.getMonth() + 1).padStart(2, '0');
                        const newD = String(nextMonth.getDate()).padStart(2, '0');
                        const newDueDate = `${newY}-${newM}-${newD}`;

                        const historyEntry = {
                            date: new Date().toLocaleDateString('es-CO'),
                            amount: priceToPay,
                            periodCovered: client.dueDate 
                        };

                        const updatedHistory = [...(client.history || []), historyEntry];

                        await db.collection("clientes").doc(client.id).update({
                            dueDate: newDueDate,
                            status: 'aldia',
                            history: updatedHistory
                        });

                    } catch (error) {
                        console.error("Error al renovar: ", error);
                        alert("Hubo un error al registrar el pago.");
                    }
                }
            };

            const handleWhatsApp = (client) => {
                let phone = (client.phone || '').replace(/\D/g, '');
                if (!phone) return alert("Este cliente no tiene un número de teléfono registrado.");
                if (phone.length === 10 && phone.startsWith('3')) phone = '57' + phone;

                const priceValue = client.price ? Number(client.price) : 0;
                const message = `Hola ${client.name || 'estimado cliente'}, te recordamos que tu mes de servicio de internet se encuentra pendiente de pago desde el ${client.dueDate || 'día de corte'}. El saldo a cancelar es de $${priceValue.toLocaleString('es-CO')}. Por favor realiza el pago para evitar la suspensión del servicio. ¡Gracias!`;
                
                const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
                window.open(url, '_blank');
            };

            const deleteClient = async (id) => {
                if (window.confirm('¿Eliminar este registro en la nube de forma permanente?')) {
                    await db.collection("clientes").doc(id).delete();
                }
            };

            const editClient = (client) => {
                setFormData({
                    name: client.name || '',
                    zona: client.zona || '', // Incluir zona al editar
                    phone: client.phone || '',
                    ip: client.ip || '',
                    plan: client.plan || '',
                    price: client.price || '',
                    dueDate: client.dueDate || '',
                    status: client.status || 'aldia',
                    history: client.history || []
                });
                setEditingId(client.id);
                setIsFormOpen(true);
            };

            const closeForm = () => {
                setIsFormOpen(false);
                setEditingId(null);
                setFormData({ name: '', zona: '', phone: '', ip: '', plan: '', price: '', dueDate: '', status: 'aldia', history: [] });
            };

            const handlePrint = () => window.print();

            // Filtrado de clientes (búsqueda y estado)
            const filteredClients = useMemo(() => {
                return clients.filter(client => {
                    const safeName = client.name || '';
                    const safeIp = client.ip || '';
                    const nameMatch = safeName.toLowerCase().includes(searchTerm.toLowerCase());
                    const ipMatch = safeIp.includes(searchTerm);
                    const matchesSearch = nameMatch || ipMatch;
                    const matchesFilter = filterStatus === 'todos' || client.status === filterStatus;
                    return matchesSearch && matchesFilter;
                });
            }, [clients, searchTerm, filterStatus]);

            // NUEVO: Extraer zonas únicas para el autocompletado del formulario
            const existingZones = useMemo(() => {
                const zones = clients.map(c => c.zona).filter(z => z && z.trim() !== '');
                return [...new Set(zones)].sort();
            }, [clients]);

            // NUEVO: Agrupar clientes filtrados por Zona
            const groupedClients = useMemo(() => {
                const grouped = {};
                filteredClients.forEach(client => {
                    const zone = (client.zona && client.zona.trim() !== '') ? client.zona : 'Sin Zona';
                    if (!grouped[zone]) grouped[zone] = [];
                    grouped[zone].push(client);
                });
                return grouped;
            }, [filteredClients]);

            // NUEVO: Ordenar las zonas alfabéticamente (dejando "Sin Zona" al final)
            const sortedZones = Object.keys(groupedClients).sort((a, b) => {
                if (a === 'Sin Zona') return 1;
                if (b === 'Sin Zona') return -1;
                return a.localeCompare(b);
            });

            const stats = useMemo(() => {
                return {
                    total: clients.length,
                    pendientes: clients.filter(c => c.status === 'pendiente' || c.status === 'cortado').length
                };
            }, [clients]);

            const todayDate = new Date().toLocaleDateString('es-CO');

            if (loading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 text-indigo-600">
                        <i className="fa-solid fa-circle-notch fa-spin text-4xl mb-4"></i>
                        <p className="font-bold animate-pulse">Conectando a la nube...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col max-w-md mx-auto bg-slate-50 shadow-2xl relative">
                    <header className="no-print bg-gradient-to-br from-indigo-600 via-indigo-700 to-violet-800 text-white p-6 rounded-b-[2rem] shadow-[0_10px_40px_-10px_rgba(79,70,229,0.5)] sticky top-0 z-20">
                        <div className="flex justify-between items-center mb-4">
                            <div>
                                <h1 className="text-2xl font-bold tracking-tight flex items-center">
                                    <i className="fa-solid fa-wifi mr-3 text-indigo-200"></i>
                                    WISP Control
                                </h1>
                            </div>
                            <div className="bg-white/10 w-10 h-10 flex items-center justify-center rounded-full relative">
                                <i className="fa-solid fa-cloud text-indigo-100"></i>
                                <span className="absolute -top-1 -right-1 w-3 h-3 bg-emerald-400 rounded-full border-2 border-indigo-700"></span>
                            </div>
                        </div>
                        <div className="grid grid-cols-2 gap-3 mt-2">
                            <div className="bg-white/10 backdrop-blur-md p-4 rounded-2xl border border-white/10 relative overflow-hidden">
                                <i className="fa-solid fa-users absolute -right-2 -bottom-2 text-5xl text-white opacity-5"></i>
                                <span className="text-[10px] uppercase font-bold text-indigo-200 block mb-1 relative z-10">Clientes</span>
                                <div className="text-2xl font-black relative z-10">{stats.total}</div>
                            </div>
                            <div className="bg-white/10 backdrop-blur-md p-4 rounded-2xl border border-white/10 text-orange-200 relative overflow-hidden">
                                <i className="fa-solid fa-hand-holding-dollar absolute -right-2 -bottom-2 text-5xl text-white opacity-5"></i>
                                <span className="text-[10px] uppercase font-bold text-indigo-200 block mb-1 relative z-10">Por Cobrar</span>
                                <div className="text-2xl font-black relative z-10">{stats.pendientes}</div>
                            </div>
                        </div>
                    </header>

                    <main className="no-print flex-1 px-4 py-6 overflow-y-auto pb-32">
                        <div className="space-y-3 mb-6">
                            <div className="relative">
                                <i className="fa-solid fa
